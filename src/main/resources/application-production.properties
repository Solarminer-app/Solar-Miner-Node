spring.application.name=Solarminer.app - Local node
vaadin.launch-browser=true
vaadin.i18n.provider=de.verdox.pv_miner.frontend.VaadinI18nProvider
spring.messages.encoding=UTF-8

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

solarmining.backend.url.rest=${BACKEND_URL:https://lightning.solarminer.app:443}
solarmining.backend.url.socket=${BACKEND_WS_URL:wss://lightning.solarminer.app:443/lightning-tunnel}
solarmining.core.url=${CORE_MICRO_SERVICE_URL}
solarmining.currency-service.url=${CURRENCY_MICRO_SERVICE_URL}
solarmining.phoenix.url=${PHOENIXD_BACKEND_URL}
solarmining.phoenix.config=${PHOENIX_CONFIG_PATH}
solarmining.phoenix.seed=${PHOENIX_SEED_PATH}

influxdb.org=${INFLUXDB_ORG}
influxdb.bucket=${INFLUXDB_BUCKET}
influxdb.url=${INFLUXDB_URL}

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}

influxdb.token=${INFLUXDB_ADMIN_TOKEN}
spring.datasource.password=${MYSQL_PASSWORD}


