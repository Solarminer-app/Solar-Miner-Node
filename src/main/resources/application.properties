spring.application.name=Solarminer.app - Local node
server.port=8080
vaadin.enabled=false
vaadin.launch-browser=false
spring.messages.encoding=UTF-8
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
influxdb.dashboard-chart-cache-duration=${INFLUXDB_DASHBOARD_CHART_CACHE_DURATION:5m}
influxdb.dashboard-history-window=${INFLUXDB_DASHBOARD_HISTORY_WINDOW:7d}
influxdb.write-batch-size=${INFLUXDB_WRITE_BATCH_SIZE:500}
influxdb.write-flush-interval=${INFLUXDB_WRITE_FLUSH_INTERVAL:5s}
influxdb.raw-retention=${INFLUXDB_RAW_RETENTION:90d}
