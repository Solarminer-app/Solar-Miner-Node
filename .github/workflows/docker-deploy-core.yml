  build-and-push:
    name: Build Core ${{ matrix.arch }}
    needs:
      - metadata
#      - test

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Core image
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          ./gradlew :core:clean :core:bootBuildImage \
            --imageName="${IMAGE}:${VERSION}-${{ matrix.arch }}" \
            --publishImage \
            -x test \
            --no-daemon

  create-manifest:
    name: Publish Core multi-architecture image
    needs:
      - metadata
      - build-and-push

    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push Core manifest
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Inspect published Core image
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"