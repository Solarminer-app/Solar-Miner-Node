name: Release SolarMiner Frontend JVM

on:
  push:
    tags:
      - "frontend-v*"
  workflow_dispatch:
    inputs:
      version:
        description: ""
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-frontend-jvm-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Read Frontend metadata
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.metadata.outputs.version }}
      image: ${{ steps.metadata.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read and validate Frontend version
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          VERSION="$(./gradlew -q printFrontendVersion)"
          IMAGE="$(./gradlew -q printFrontendImage)"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "frontendVersion must use x.y.z, got: $VERSION" >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "push" ]]; then
            RELEASE_VERSION="${REF_NAME#frontend-v}"
          else
            RELEASE_VERSION="$REQUESTED_VERSION"
          fi

          if [[ "$RELEASE_VERSION" != "$VERSION" ]]; then
            echo "Release version and Gradle version do not match:" >&2
            echo "  Release version: $RELEASE_VERSION" >&2
            echo "  frontendVersion: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

          echo "Frontend version: $VERSION"
          echo "Docker image:     ${IMAGE}:${VERSION}-jvm"

