  build-and-push:
    name: Build Frontend JVM ${{ matrix.arch }}
    needs:
      - metadata
#      - test

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64

          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Frontend JVM image
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          # Use absolute Gradle task paths. An unqualified `bootBuildImage`
          # also selects tasks with that name in subprojects such as pc-agent.
          ./gradlew :clean :bootBuildImage \
            --imageName="${IMAGE}:${VERSION}-jvm-${{ matrix.arch }}" \
            --publishImage \
            -x test \
            --no-daemon

  create-manifest:
    name: Publish Frontend JVM multi-architecture image
    needs:
      - metadata
      - build-and-push

    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push Frontend JVM manifest
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}-jvm" \
            --tag "${IMAGE}:latest-jvm" \
            "${IMAGE}:${VERSION}-jvm-amd64" \
            "${IMAGE}:${VERSION}-jvm-arm64"

      - name: Inspect published Frontend JVM image
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools inspect "${IMAGE}:${VERSION}-jvm"
