mutation SetPool(
    $groupId: ID!,
    $url: String!,
    $user: String!,
    $password: String
) {
    bosminer {
        config {
            group(id: $groupId) {
                ... on GroupConfigurator {
                    addPool(
                        enabled: true
                        url: $url
                        user: $user
                        password: $password
                    ) {
                        __typename
                        ... on PoolConfig {
                            id
                            enabled
                            url
                            user
                        }
                        ... on PoolRecordError {
                            message
                            invalidUrl
                            invalidUser
                        }
                    }
                }
                ... on AttributeError {
                    message
                }
            }
        }
    }
}